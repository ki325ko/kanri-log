<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png" type="image/png">
<link rel="apple-touch-icon" href="icon.png">
<title>管理ログ</title>
<style>
:root{
  --p:#6366f1;--pd:#4f46e5;--pl:#a5b4fc;--pb:#eef2ff;
  --g:#10b981;--gb:#d1fae5;
  --r:#ef4444;--rb:#fef2f2;
  --y:#f59e0b;--yb:#fffbeb;
  --bg:#f1f5f9;--sur:#fff;--t:#0f172a;--t2:#475569;--t3:#94a3b8;
  --bdr:#e2e8f0;--sh:0 1px 4px rgba(0,0,0,.08);--shl:0 8px 32px rgba(0,0,0,.14);
  --rad:12px;--rads:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Hiragino Sans','Meiryo',sans-serif;background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
.app{display:flex;height:100dvh;overflow:hidden}
.sidebar{width:220px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;z-index:10}
.sidebar-logo{padding:20px 18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr)}
.logo-icon{width:36px;height:36px;background:var(--p);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;font-weight:900;flex-shrink:0}
.logo-text{font-size:1.1rem;font-weight:800;color:var(--t)}
.nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rads);color:var(--t2);font-size:.88rem;font-weight:600;cursor:pointer;transition:all .12s;border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{background:var(--bg);color:var(--t)}
.nav-item.active{background:var(--pb);color:var(--p)}
.nav-item .icon{width:20px;height:20px;flex-shrink:0;opacity:.7}
.nav-item.active .icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--r);color:#fff;font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--bdr)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:1.05rem;font-weight:800;color:var(--t)}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{flex:1;overflow-y:auto;padding:24px}
.btn{padding:8px 16px;border:none;border-radius:var(--rads);font-size:.83rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .12s;cursor:pointer;white-space:nowrap}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}
.btn-out{background:transparent;border:1.5px solid var(--bdr);color:var(--t2)}.btn-out:hover{background:var(--bg)}
.btn-ghost{background:transparent;color:var(--t2)}.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:var(--rb);color:var(--r);border:1px solid #fecaca}.btn-danger:hover{background:#fee2e2}
.btn-sm{padding:5px 10px;font-size:.76rem}
.btn-xs{padding:3px 8px;font-size:.72rem}
.btn-green{background:var(--g);color:#fff}.btn-green:hover{filter:brightness(.92)}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:50%}
.card{background:var(--sur);border-radius:var(--rad);box-shadow:var(--sh);padding:20px}
.card-sm{padding:14px 16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.stat-card{background:var(--sur);border-radius:var(--rad);box-shadow:var(--sh);padding:18px 20px}
.stat-num{font-size:2rem;font-weight:800;line-height:1}
.stat-label{font-size:.75rem;color:var(--t3);font-weight:600;margin-top:4px}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 16px;backdrop-filter:blur(2px)}
.modal{background:var(--sur);border-radius:16px;width:100%;max-width:720px;box-shadow:var(--shl);animation:minIn .2s ease}
@keyframes minIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.modal-head h2{font-size:1.05rem;font-weight:700}
.modal-body{padding:24px;max-height:75vh;overflow-y:auto}
.modal-foot{padding:14px 24px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.fg label{font-size:.72rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select,.fg textarea{padding:9px 12px;border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:.88rem;font-family:inherit;transition:border .12s;background:var(--sur);color:var(--t)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.fg textarea{resize:vertical;min-height:64px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid .full{grid-column:1/-1}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
.badge-pre{background:#f1f5f9;color:#64748b}
.badge-premonitor{background:#fef3c7;color:#d97706}
.badge-monitor{background:#eff6ff;color:#3b82f6}
.badge-contracted{background:var(--gb);color:#059669}
.badge-lost{background:var(--rb);color:var(--r)}
.badge-client{background:var(--pb);color:var(--p)}
.pri-high{color:var(--r)}.pri-med{color:var(--y)}.pri-low{color:var(--g)}
.client-row{background:var(--sur);border-radius:var(--rad);box-shadow:var(--sh);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .12s;border:1.5px solid transparent;margin-bottom:8px}
.client-row:hover{border-color:var(--pl);box-shadow:var(--shl);transform:translateY(-1px)}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#fff;flex-shrink:0}
.client-info{flex:1;min-width:0}
.client-name{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-meta{font-size:.76rem;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.task-item{background:var(--sur);border-radius:var(--rads);padding:12px 16px;display:flex;align-items:flex-start;gap:12px;border:1.5px solid var(--bdr);margin-bottom:6px;transition:all .12s}
.task-item:hover{border-color:var(--pl)}
.task-item.done{opacity:.5}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--bdr);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.task-check.checked{background:var(--g);border-color:var(--g);color:#fff}
.task-body{flex:1;min-width:0}
.task-title{font-size:.88rem;font-weight:600;line-height:1.4}
.task-meta{font-size:.72rem;color:var(--t3);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.overdue{color:var(--r)!important;font-weight:700}
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px}
.kanban-col{min-width:220px;max-width:240px;flex-shrink:0}
.kanban-head{font-size:.78rem;font-weight:700;padding:8px 12px;border-radius:var(--rads);margin-bottom:8px;display:flex;justify-content:space-between}
.kanban-pre .kanban-head{background:#f1f5f9;color:#64748b}
.kanban-premonitor .kanban-head{background:#fef3c7;color:#d97706}
.kanban-monitor .kanban-head{background:#eff6ff;color:#3b82f6}
.kanban-contracted .kanban-head{background:var(--gb);color:#059669}
.kanban-lost .kanban-head{background:var(--rb);color:var(--r)}
.kanban-card{background:var(--sur);border-radius:var(--rads);padding:12px;box-shadow:var(--sh);margin-bottom:8px;cursor:pointer;border:1.5px solid transparent;transition:all .12s}
.kanban-card:hover{border-color:var(--pl)}
.kanban-card-name{font-size:.85rem;font-weight:700}
.kanban-card-meta{font-size:.72rem;color:var(--t2);margin-top:3px}
.kanban-card-deal{font-size:.8rem;font-weight:700;color:var(--p);margin-top:6px}
.tab-bar{display:flex;gap:2px;background:var(--bg);border-radius:var(--rads);padding:3px;margin-bottom:20px}
.tab-btn{flex:1;padding:7px 12px;border:none;border-radius:6px;font-size:.8rem;font-weight:600;color:var(--t2);background:transparent;cursor:pointer;transition:all .12s}
.tab-btn.active{background:var(--sur);color:var(--p);box-shadow:var(--sh)}
.log-table{width:100%;border-collapse:collapse;font-size:.82rem}
.log-table th,.log-table td{padding:8px 12px;border-bottom:1px solid var(--bdr);text-align:center}
.log-table th{font-size:.72rem;font-weight:700;color:var(--t3);text-align:center;background:var(--bg)}
.log-table td:first-child{text-align:left;font-weight:600}
.detail-tabs{display:flex;gap:2px;margin-bottom:16px}
.detail-tab{padding:6px 14px;border-radius:var(--rads);border:none;font-size:.8rem;font-weight:600;color:var(--t2);background:transparent;cursor:pointer;transition:all .12s}
.detail-tab.active{background:var(--pb);color:var(--p)}
.meeting-item{border:1.5px solid var(--bdr);border-radius:var(--rads);padding:12px;margin-bottom:8px}
.meeting-date{font-size:.75rem;font-weight:700;color:var(--p);margin-bottom:4px}
.meeting-title{font-size:.9rem;font-weight:700}
.meeting-body{font-size:.82rem;color:var(--t2);margin-top:6px;white-space:pre-wrap}
.memo-item{background:var(--pb);border-radius:var(--rads);padding:10px 14px;margin-bottom:6px;font-size:.85rem;white-space:pre-wrap;position:relative}
.memo-date{font-size:.7rem;color:var(--t3);margin-bottom:4px}
/* 名刺 */
.meishi-card{background:var(--sur);border-radius:var(--rad);box-shadow:var(--sh);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .12s;border:1.5px solid transparent;margin-bottom:8px}
.meishi-card:hover{border-color:var(--pl);box-shadow:var(--shl);transform:translateY(-1px)}
.meishi-table-wrap{overflow:auto;max-height:calc(100vh - 220px);border-radius:var(--rad);box-shadow:var(--sh);background:var(--sur)}
.meishi-table{width:100%;border-collapse:collapse;font-size:.8rem}
.meishi-table th{background:var(--pb);color:var(--p);font-weight:700;padding:8px 12px;text-align:left;white-space:nowrap;border-bottom:2px solid var(--bdr);position:sticky;top:0;z-index:1}
.meishi-table td{padding:8px 12px;border-bottom:1px solid var(--bdr);white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;color:var(--t1);background:var(--sur)}
.meishi-table tr{cursor:pointer;transition:background .1s}
.meishi-table tr:hover td{background:var(--pb)}
.meishi-table tr:hover .col-sticky{background:var(--pb)}
.col-sticky{position:sticky;z-index:2;background:var(--sur)}
.meishi-table th.col-sticky{z-index:3;background:var(--pb)}
.tag-chip{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600;background:var(--pb);color:var(--p);cursor:pointer;border:1.5px solid transparent}
.tag-chip:hover,.tag-chip.active{background:var(--p);color:#fff}
.tags-input{display:flex;flex-wrap:wrap;gap:4px;padding:6px 8px;border:1.5px solid var(--bdr);border-radius:var(--rads);min-height:38px;align-items:center;cursor:text;background:var(--sur)}
.tags-input:focus-within{border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.tags-input .itag{display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600;background:var(--pb);color:var(--p)}
.tags-input .itag button{background:none;border:none;cursor:pointer;color:var(--p);padding:0 2px;font-size:.8rem}
.tags-input input{border:none;outline:none;font-size:.85rem;flex:1;min-width:80px;padding:2px 4px;background:transparent}
/* OCR */
.ocr-zone{border:2px dashed var(--pl);border-radius:var(--rad);padding:24px;text-align:center;background:var(--pb);transition:all .15s;cursor:pointer}
.ocr-zone:hover,.ocr-zone.dragover{background:#c7d2fe;border-color:var(--p)}
.ocr-prog{margin-top:12px}
.ocr-bar{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden}
.ocr-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--g));border-radius:3px;transition:width .3s;width:0%}
/* Scheduler */
.sched-layout{display:grid;grid-template-columns:1fr 360px;gap:16px;height:calc(100dvh - 105px)}
.sched-cal{border-radius:var(--rad);overflow:hidden;background:var(--sur);box-shadow:var(--sh)}
.sched-cal iframe{width:100%;height:100%;border:none;display:block}
.sched-right{overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.slot-item{background:var(--sur);border:1.5px solid var(--bdr);border-radius:var(--rads);padding:10px 14px;display:flex;align-items:center;gap:10px}
.slot-item .slot-text{flex:1;font-size:.88rem;font-weight:600;color:var(--p)}
.gen-msg{width:100%;padding:12px;border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:.83rem;font-family:inherit;resize:vertical;min-height:150px;background:var(--bg);line-height:1.8}
@media(max-width:900px){.sched-layout{grid-template-columns:1fr;height:auto}.sched-cal{height:400px}}
@media(max-width:768px){
  .sidebar{display:none}
  .grid4{grid-template-columns:repeat(2,1fr)}
  .grid3{grid-template-columns:repeat(2,1fr)}
  .fgrid{grid-template-columns:1fr}
  .content{padding:12px!important;padding-bottom:72px!important}
  .topbar{padding:0 12px}
  .topbar-title{font-size:.95rem}
  .client-row{padding:10px 12px;gap:8px}
  .avatar{width:38px;height:38px;font-size:.85rem}
  .client-name{font-size:.88rem}
  .client-meta{font-size:.7rem}
  .stat-num{font-size:1.5rem}
  .kanban{padding-bottom:80px}
}
/* ボトムナビ */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bdr);z-index:200;padding:4px 0;padding-bottom:max(6px,env(safe-area-inset-bottom,6px));flex-direction:row}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 2px;border:none;background:transparent;color:var(--t3);font-size:.62rem;font-weight:600;font-family:inherit;cursor:pointer;position:relative;transition:color .12s}
.bnav-item.active{color:var(--p)}
.bnav-item svg{width:21px;height:21px;stroke-width:1.8}
.bnav-badge{position:absolute;top:2px;right:calc(50% - 16px);background:var(--r);color:#fff;font-size:.55rem;font-weight:700;padding:0px 4px;border-radius:8px;min-width:14px;text-align:center}
@media(max-width:768px){.bottom-nav{display:flex}}
/* 同期ボタン */
.sync-btn{display:flex;align-items:center;gap:6px;width:100%;padding:8px 12px;border:1.5px solid var(--bdr);border-radius:var(--rads);background:transparent;color:var(--t2);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .12s}
.sync-btn:hover{background:var(--bg)}
.hidden{display:none!important}
.sep{height:1px;background:var(--bdr);margin:16px 0}
.empty-state{text-align:center;padding:48px 20px;color:var(--t3)}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="icon.png" style="width:32px;height:32px;object-fit:contain;flex-shrink:0">
      <span class="logo-text">管理ログ</span>
    </div>
    <nav class="nav">
      <button class="nav-item active" onclick="showPage('home')" id="nav-home">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        ホーム
      </button>
      <button class="nav-item" onclick="showPage('clients')" id="nav-clients">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        クライアント
      </button>
      <button class="nav-item" onclick="showPage('tasks')" id="nav-tasks">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        タスク
        <span class="nav-badge hidden" id="task-badge">0</span>
      </button>
      <button class="nav-item" onclick="showPage('scheduler')" id="nav-scheduler">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        日程提案
      </button>
      <button class="nav-item" onclick="showPage('log')" id="nav-log">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        日次ログ
      </button>
      <button class="nav-item" onclick="showPage('diary')" id="nav-diary">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        日記
      </button>
      <div class="sep" style="margin:8px 0"></div>
      <button class="nav-item" onclick="showPage('meishi')" id="nav-meishi">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h.01M10 12h8"/></svg>
        名刺
      </button>
      <button class="nav-item" onclick="showPage('settings')" id="nav-settings">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        設定
      </button>
    </nav>
    <div class="sidebar-footer" style="display:flex;flex-direction:column;gap:6px">
      <button class="gh-sync-btn sync-btn" onclick="githubSaveNow()">

<script>
// ===== DATA =====
const SK = 'saleshub_v1', MSK = 'businessCards', AK = 'geminiApiKey';
const IS_LOCAL = ['localhost', '127.0.0.1'].includes(location.hostname);
const GH_REPO = 'ki325ko/kanri-log-data';
const GH_TOKEN_KEY = 'kanrilog_gh_token';
let ghSHA = null, ghSaveTimer = null;

function getGhToken() { return localStorage.getItem(GH_TOKEN_KEY) || ''; }

function setGhUI(label, ok) {
  document.querySelectorAll('.gh-sync-label').forEach(el => el.textContent = label);
  document.querySelectorAll('.gh-sync-btn').forEach(el => el.style.background = ok ? 'rgba(16,185,129,.15)' : '');
}

async function githubLoad() {
  const token = getGhToken(); if (!token) return;
  setGhUI('読込中...', false);
  try {
    const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/data.json`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!r.ok) { setGhUI('エラー', false); return; }
    const j = await r.json();
    ghSHA = j.sha;
    const data = JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))));
    // GitHubが正のデータソース。常に適用してローカルとマージ
    if (data.lines) {
      if (data.lines.tasks) data.lines.tasks = mergeArr(D.tasks||[], data.lines.tasks);
      if (data.lines.clients) data.lines.clients = mergeArr(D.clients||[], data.lines.clients);
      D = data.lines;
      localStorage.setItem(SK, JSON.stringify(D));
    }
    if (data.meishi && Array.isArray(data.meishi)) {
      MC = mergeArr(MC, data.meishi);
      localStorage.setItem(MSK, JSON.stringify(MC));
    }
    updateBadge(); showPage(currentPage);
    setGhUI('同期済', true);
  } catch(e) { console.error('GitHub load:', e); setGhUI('エラー', false); }
}

async function githubSaveNow() {
  const token = getGhToken(); if (!token) return;
  try {
    if (!ghSHA) {
      const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/data.json`, {
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (r.ok) { const j = await r.json(); ghSHA = j.sha; }
    }
    const content = btoa(unescape(encodeURIComponent(JSON.stringify({lines:D, meishi:MC}))));
    const body = { message:`update ${new Date().toISOString()}`, content };
    if (ghSHA) body.sha = ghSHA;
    const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/data.json`, {
      method:'PUT', headers:{ Authorization:`token ${token}`, 'Content-Type':'application/json', Accept:'application/vnd.github.v3+json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error((await r.json()).message || r.status);
    ghSHA = (await r.json()).content.sha;
    setGhUI('同期済', true);
  } catch(e) { console.error('GitHub save:', e); setGhUI('エラー', false); }
}

function githubSave() {
  if (!getGhToken()) return;
  clearTimeout(ghSaveTimer);
  ghSaveTimer = setTimeout(githubSaveNow, 2000);
}

function saveGhToken() {
  const t = document.getElementById('gh-token-input')?.value.trim();
  if (!t) return;
  localStorage.setItem(GH_TOKEN_KEY, t);
  githubLoad();
}

async function saveToLocal() {
  if (!IS_LOCAL) return;
  try {
    await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({lines:D, meishi:MC}) });
  } catch(e) {}
}

async function loadFromLocal() {
  if (!IS_LOCAL) return;
  try {
    const r = await fetch('/api/data');
    if (!r.ok) return;
    const data = await r.json();
    let changed = false;
    if (data.lines && (data.lines.lastUpdated||0) > (D.lastUpdated||0)) {
      D = data.lines; localStorage.setItem(SK, JSON.stringify(D)); changed = true;
    }
    if (data.meishi && Array.isArray(data.meishi) && data.meishi.length) {
      MC = data.meishi; localStorage.setItem(MSK, JSON.stringify(MC)); changed = true;
    }
    if (changed) { updateBadge(); showPage(currentPage); }
  } catch(e) {}
}
let D = load();
let MC = loadMeishi();

function load() {
  try { return JSON.parse(localStorage.getItem(SK)) || defD(); } catch { return defD(); }
}
function defD() { return { clients: [], tasks: [], logs: [], calUrl: '', lastUpdated: Date.now() }; }
function save() { D.lastUpdated = Date.now(); localStorage.setItem(SK, JSON.stringify(D)); updateBadge(); githubSave(); driveSave(); saveToLocal(); }
function loadMeishi() { try { return JSON.parse(localStorage.getItem(MSK)) || []; } catch { return []; } }
function saveMeishi() { localStorage.setItem(MSK, JSON.stringify(MC)); githubSave(); driveSave(); saveToLocal(); }

// ===== UTILS =====
const COLORS = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#14b8a6'];
function aColor(name) { let h=0; for(let c of (name||'')) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function initials(name) { return (name||'?').split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function today() { return new Date().toISOString().slice(0,10); }
function fmt(d) { if(!d) return ''; return new Date(d).toLocaleDateString('ja-JP',{month:'short',day:'numeric'}); }
function fmtFull(d) { if(!d) return ''; return new Date(d).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}); }
function isOverdue(d) { return d && d < today(); }
const SL = { pre:'商談前', premonitor:'モニター導入前', monitor:'モニター', contracted:'契約', lost:'失注' };
const TASK_CAT = { '':'一般', client:'クライアント', repair:'改修', misc:'雑務' };
const PL = { high:'🔴 高', med:'🟡 中', low:'🟢 低' };
const DOW = ['日','月','火','水','木','金','土'];
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function v(id) { const el=document.getElementById(id); return el?el.value:''; }
function num(id) { return Number(v(id))||0; }
function clientName(id) { return D.clients.find(c=>c.id===id)?.name || ''; }

function updateBadge() {
  const pending = D.tasks.filter(t => !t.done).length;
  const badge = document.getElementById('task-badge');
  if(badge) { badge.textContent = pending; badge.classList.toggle('hidden', pending===0); }
  const bbadge = document.getElementById('bnav-badge');
  if(bbadge) { bbadge.textContent = pending; bbadge.classList.toggle('hidden', pending===0); }
}

// ===== NAVIGATION =====
let currentPage = 'home';
function showPage(p) {
  currentPage = p;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const nav = document.getElementById('nav-'+p);
  if(nav) nav.classList.add('active');
  document.querySelectorAll('.bnav-item').forEach(n => n.classList.remove('active'));
  const bnav = document.getElementById('bnav-'+p);
  if(bnav) bnav.classList.add('active');
  const titles = { home:'ホーム', clients:'クライアント', tasks:'タスク', scheduler:'日程提案', log:'日次ログ', meishi:'名刺', settings:'設定', diary:'日記' };
  document.getElementById('page-title').textContent = titles[p] || p;
  document.getElementById('topbar-actions').innerHTML = p === 'diary' ? '' : '<button class="btn btn-p btn-sm" onclick="openQuickAdd()">＋ 追加</button>';
  const el = document.getElementById('content');
  el.innerHTML = '';
  el.style.padding = p === 'scheduler' ? '0' : '24px';
  const fn = { home:renderHome, clients:renderClients, tasks:renderTasks, scheduler:renderScheduler, log:renderLog, meishi:renderMeishi, settings:renderSettings, diary:renderDiary };
  if(fn[p]) fn[p]();
}

// ===== HOME =====
function renderHome() {
  const el = document.getElementById('content');
  const now = today();
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr = tomorrow.toISOString().slice(0,10);
  const todayTasks = D.tasks.filter(t => !t.done && t.due === now);
  const tomorrowTasks = D.tasks.filter(t => !t.done && t.due === tomorrowStr);
  const doneTasks = D.tasks.filter(t => t.done);
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
  const weekDone = D.tasks.filter(t => t.done && t.doneAt && new Date(t.doneAt) >= weekAgo);
  const log = D.logs.find(l => l.date === now);

  const taskRow = t => `
    <div class="task-item" style="cursor:default;margin-bottom:4px">
      <div class="task-check ${t.done?'checked':''}" onclick="toggleTask('${t.id}')">✓</div>
      <div class="task-body">
        <div class="task-title" style="font-size:.85rem">${esc(t.title)}</div>
        <div class="task-meta">
          ${t.clientId?`<span>👤 ${esc(clientName(t.clientId))}</span>`:''}
          ${t.category?`<span style="color:var(--p)">${esc(TASK_CAT[t.category]||t.category)}</span>`:''}
          <span class="pri-${t.priority||'med'}">${PL[t.priority||'med']}</span>
        </div>
      </div>
    </div>`;

  el.innerHTML = `
    <div class="grid4" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-num" style="color:var(--p)">${doneTasks.length}</div><div class="stat-label">達成タスク累計</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--g)">${weekDone.length}</div><div class="stat-label">今週の達成</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--y)">${todayTasks.length}</div><div class="stat-label">今日のタスク</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--t2)">${tomorrowTasks.length}</div><div class="stat-label">明日のタスク</div></div>
    </div>
    <div class="grid2" style="margin-bottom:20px">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h3 style="font-size:.9rem;font-weight:700">📋 今日のタスク</h3>
          <button class="btn btn-ghost btn-xs" onclick="showPage('tasks')">すべて →</button>
        </div>
        ${todayTasks.length ? todayTasks.map(taskRow).join('') : '<div class="empty-state" style="padding:16px"><p>今日のタスクなし</p></div>'}
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h3 style="font-size:.9rem;font-weight:700">📋 明日のタスク</h3>
        </div>
        ${tomorrowTasks.length ? tomorrowTasks.map(taskRow).join('') : '<div class="empty-state" style="padding:16px"><p>明日のタスクなし</p></div>'}
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h3 style="font-size:.9rem;font-weight:700">📊 今日のログ（${fmtFull(now)}）</h3>
        <button class="btn btn-p btn-sm" onclick="openLogInput('${now}')">入力 / 編集</button>
      </div>
      ${log ? `
        <div class="grid4">
          <div class="stat-card card-sm" style="box-shadow:none;background:var(--bg)"><div class="stat-num" style="font-size:1.4rem">${log.apo||0}</div><div class="stat-label">アポ数</div></div>
          <div class="stat-card card-sm" style="box-shadow:none;background:var(--bg)"><div class="stat-num" style="font-size:1.4rem">${log.meetings||0}</div><div class="stat-label">打ち合わせ</div></div>
          <div class="stat-card card-sm" style="box-shadow:none;background:var(--bg)"><div class="stat-num" style="font-size:1.4rem">${log.proposals||0}</div><div class="stat-label">提案</div></div>
          <div class="stat-card card-sm" style="box-shadow:none;background:var(--bg)"><div class="stat-num" style="font-size:1.4rem;color:var(--g)">${log.won||0}</div><div class="stat-label">受注</div></div>
        </div>
        ${log.memo?`<div style="margin-top:12px;font-size:.85rem;color:var(--t2);white-space:pre-wrap">${esc(log.memo)}</div>`:''}`
      : '<div class="empty-state" style="padding:20px"><p>今日のログがまだありません</p></div>'}
    </div>`;
}

// ===== CLIENTS =====
let clientView = 'list', clientSearch = '', clientFilter = 'all';
function renderClients() {
  const el = document.getElementById('content');
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-p btn-sm" onclick="openClientForm()">＋ 追加</button>`;

  // 検索・フィルター・ビュー切替
  el.innerHTML = `
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
      <input type="text" placeholder="検索..." value="${esc(clientSearch)}" oninput="clientSearch=this.value;renderClients()" style="padding:7px 12px;border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:.83rem;flex:1;min-width:120px;background:var(--sur)">
      <select onchange="clientFilter=this.value;renderClients()" style="padding:7px 10px;border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:.83rem;background:var(--sur)">
        <option value="all" ${clientFilter==='all'?'selected':''}>全ステータス</option>
        ${Object.entries(SL).filter(([v])=>v!=='lost').map(([v,l])=>`<option value="${v}" ${clientFilter===v?'selected':''}>${l}</option>`).join('')}
      </select>
      <div style="display:flex;gap:4px">
        <button class="btn btn-out btn-sm" onclick="clientView='list';renderClients()" style="${clientView==='list'?'background:var(--pb);color:var(--p)':''}">一覧</button>
        <button class="btn btn-out btn-sm" onclick="clientView='kanban';renderClients()" style="${clientView==='kanban'?'background:var(--pb);color:var(--p)':''}">カンバン</button>
      </div>
    </div>
    <div id="clients-body"></div>`;

  // 失注は名刺へ。クライアント一覧には表示しない
  let clients = D.clients.filter(c => {
    if(c.status === 'lost') return false;
    if(clientFilter !== 'all' && c.status !== clientFilter) return false;
    if(clientSearch) {
      const q = clientSearch.toLowerCase();
      return (c.name||'').toLowerCase().includes(q) || (c.company||'').toLowerCase().includes(q);
    }
    return true;
  });

  const body = document.getElementById('clients-body');

  if(clientView === 'kanban') {
    body.innerHTML = `<div class="kanban">${['pre','premonitor','monitor','contracted'].map(s => `
      <div class="kanban-col kanban-${s}">
        <div class="kanban-head"><span>${SL[s]}</span><span>${clients.filter(c=>c.status===s).length}</span></div>
        ${clients.filter(c=>c.status===s).map(c=>`
          <div class="kanban-card" onclick="openClientDetail('${c.id}')">
            <div class="kanban-card-name">${esc(c.company||c.name)}</div>
            <div class="kanban-card-meta">${esc(c.name)}${c.clientType==='agency'?' · 代理店':' · 取引先'}</div>
            ${c.ball?`<div style="font-size:.7rem;margin-top:4px">${c.ball==='us'||c.ball==='both'?'🟢':''} ${c.ball==='them'||c.ball==='both'?'🟡':''}</div>`:''}
            ${c.ballNote?`<div style="font-size:.68rem;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.ballNote)}</div>`:''}
            ${c.dealValue?`<div class="kanban-card-deal">¥${Number(c.dealValue).toLocaleString()}</div>`:''}
          </div>`).join('')}
      </div>`).join('')}</div>`;
    return;
  }

  body.innerHTML = clients.length ? clients.map((c,i) => `
    <div class="client-row" onclick="openClientDetail('${c.id}')">
      <div style="display:flex;flex-direction:column;gap:2px;margin-right:4px">
        <button class="btn btn-ghost btn-xs" style="padding:2px 5px;font-size:.7rem" onclick="event.stopPropagation();moveClient('${c.id}',-1)" ${i===0?'disabled':''}>▲</button>
        <button class="btn btn-ghost btn-xs" style="padding:2px 5px;font-size:.7rem" onclick="event.stopPropagation();moveClient('${c.id}',1)" ${i===clients.length-1?'disabled':''}>▼</button>
      </div>
      <div class="avatar" style="background:${aColor(c.company||c.name)}">${initials(c.company||c.name)}</div>
      <div class="client-info">
        <div class="client-name">${esc(c.company||c.name)}</div>
        <div class="client-meta">${[c.name,c.position].filter(Boolean).map(esc).join(' / ')}</div>
        <div onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:4px;margin-top:6px;flex-wrap:wrap">
          ${ballBtn(c,'us','🟢 自分')}
          ${ballBtn(c,'them','🟡 先方')}
          <input id="bn-${c.id}" value="${esc(c.ballNote||'')}" placeholder="ボールメモ..." onclick="event.stopPropagation()" onblur="saveBallNote('${c.id}')" onkeydown="if(event.key==='Enter'){saveBallNote('${c.id}');this.blur()}" style="border:none;border-bottom:1px solid var(--bdr);font-size:.73rem;padding:1px 4px;background:transparent;color:var(--t2);flex:1;min-width:60px;outline:none">
        </div>
      </div>
      <div class="client-right">
        <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end">

function moveClient(id, dir) {
  const visibleIds = D.clients.filter(c=>c.status!=='lost').map(c=>c.id);
  const vi = visibleIds.indexOf(id);
  const vj = vi + dir;
  if(vj < 0 || vj >= visibleIds.length) return;
  const ai = D.clients.findIndex(c=>c.id===visibleIds[vi]);
  const aj = D.clients.findIndex(c=>c.id===visibleIds[vj]);
  [D.clients[ai], D.clients[aj]] = [D.clients[aj], D.clients[ai]];
  save(); renderClients();
}

function ballBtn(c, side, label) {
  const cur = c.ball || '';
  const on = cur === side || cur === 'both';
  const onStyle = side === 'us'
    ? 'border-color:#10b981;background:var(--gb);color:#059669'
    : 'border-color:#d97706;background:#fef3c7;color:#d97706';
  const offStyle = 'border-color:var(--bdr);background:transparent;color:var(--t3)';
  return `<button onclick="setBall('${c.id}','${side}')" style="padding:2px 10px;font-size:.7rem;border-radius:10px;border:1.5px solid;${on?onStyle:offStyle};cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s">${label}</button>`;
}

function setBall(id, side) {
  const c = D.clients.find(x => x.id === id);
  if(!c) return;
  const cur = c.ball || '';
  if(side === 'us') {
    if(cur === 'us') c.ball = '';
    else if(cur === 'them') c.ball = 'both';
    else if(cur === 'both') c.ball = 'them';
    else c.ball = 'us';
  } else {
    if(cur === 'them') c.ball = '';
    else if(cur === 'us') c.ball = 'both';
    else if(cur === 'both') c.ball = 'us';
    else c.ball = 'them';
  }
  save(); renderClients();
}

function saveBallNote(id) {
  const c = D.clients.find(x => x.id === id);
  const el = document.getElementById('bn-' + id);
  if(!c || !el) return;
  c.ballNote = el.value;
  save();
}

function saveClient(id) {
  const company = document.getElementById('cf-company').value.trim();
  const name = document.getElementById('cf-name').value.trim();
  if(!company && !name) return alert('会社名または担当者名を入力してください');
  const now = new Date().toISOString();
  if(id) {
    const c = D.clients.find(x=>x.id===id);
    const newStatus = v('cf-status');
    Object.assign(c, { name: name||company, company, position:v('cf-position'), status:newStatus, clientType:v('cf-type')||'direct', ball:v('cf-ball'), ballNote:v('cf-ballnote'), phone:v('cf-phone'), email:v('cf-email'), hp:v('cf-hp'), dealValue:v('cf-deal'), notes:v('cf-notes'), updatedAt:now });
    // 失注 → 名刺に失注フラグを反映
    if(newStatus === 'lost' && c.meishiId) {
      const m = MC.find(x=>x.id===c.meishiId);
      if(m) { m.clientStatus = 'lost'; saveMeishi(); }
    } else if(newStatus !== 'lost' && c.meishiId) {
      const m = MC.find(x=>x.id===c.meishiId);
      if(m) { m.clientStatus = newStatus; saveMeishi(); }
    }
  } else {
    const newId = uid();
    const meishiId = uid();
    // クライアント直接追加時は名刺にも登録
    const mcEntry = { id:meishiId, name:name||company, company, position:v('cf-position'), phone:v('cf-phone'), email:v('cf-email'), hp:v('cf-hp'), notes:v('cf-notes'), clientStatus:'pre', clientId:newId, createdAt:Date.now(), updatedAt:Date.now() };
    MC.push(mcEntry); saveMeishi();
    D.clients.push({ id:newId, name:name||company, company, position:v('cf-position'), status:v('cf-status')||'pre', clientType:v('cf-type')||'direct', ball:v('cf-ball'), ballNote:v('cf-ballnote'), phone:v('cf-phone'), email:v('cf-email'), hp:v('cf-hp'), dealValue:v('cf-deal'), notes:v('cf-notes'), meishiId, tasks:[], meetings:[], memos:[], createdAt:now, updatedAt:now });
  }
  save(); closeModal(); renderClients();
}

function deleteClient(id) {
  if(!confirm('削除しますか？')) return;
  const c = D.clients.find(x=>x.id===id);
  if(c?.meishiId) {
    const m = MC.find(x=>x.id===c.meishiId);
    if(m) { delete m.clientStatus; delete m.clientId; saveMeishi(); }
  }
  D.clients = D.clients.filter(c => c.id !== id);
  save(); closeModal(); renderClients();
}

function saveTask(id, defClientId) {
  const title = document.getElementById('tf-title').value.trim();

  const clientId = v('tf-client');
  const category = v('tf-cat');

// ===== SCHEDULER (日程提案) =====
let sSlots = [];
let sDur = 60;
let _msgLines = [];

function getWeekStart(offset) {
  const d = new Date();
  const dow = d.getDay() || 7;
  d.setDate(d.getDate() - dow + 1 + (offset||0)*7);
  d.setHours(0,0,0,0);
  return d;
}

function addMins(time, mins) {
  const [h,m] = time.split(':').map(Number);
  const t = h*60+m+mins;
  return `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
}

function fmtSlot(s) {
  const d = new Date(s.date);
  return `${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}） ${s.start}〜${s.end}`;
}

function weekBtns() {
  const DOW2 = ['日','月','火','水','木','金','土'];
  const now = new Date();
  const btns = [];
  // 今日〜6日先まで
  for (let i = 0; i < 7; i++) {
    const d = new Date(now); d.setDate(now.getDate() + i);
    const dow = d.getDay();
    if (dow === 0) continue; // 日曜スキップ
    const val = d.toISOString().slice(0,10);
    const label = i === 0 ? '今日' : i === 1 ? '明日' : `${d.getMonth()+1}/${d.getDate()}(${DOW2[dow]})`;
    btns.push(`<button class="btn btn-out btn-sm s-day-btn" data-val="${val}" onclick="selectDay('${val}',this)">${label}</button>`);
  }
  return btns.join('');
}

function selectDay(val, el) {
  document.getElementById('s-date').value = val;
  document.getElementById('s-date').style.display = 'none';
  document.querySelectorAll('.s-day-btn').forEach(b => { b.classList.remove('btn-p'); b.classList.add('btn-out'); });
  el.classList.remove('btn-out');
  el.classList.add('btn-p');
}

function toggleDatePicker(btn) {
  const input = document.getElementById('s-date');
  const isOpen = input.style.display !== 'none';
  if (isOpen) {
    input.style.display = 'none';
    btn.classList.remove('btn-p'); btn.classList.add('btn-out');
  } else {
    input.style.display = 'block';
    // クイックボタンの選択を外す
    document.querySelectorAll('.s-day-btn').forEach(b => { b.classList.remove('btn-p'); b.classList.add('btn-out'); });
    btn.classList.remove('btn-out'); btn.classList.add('btn-p');
    input.showPicker?.();
  }
}

function onDatePickerChange(val) {
  document.getElementById('s-date').value = val;
}

function addSlot() {
  const date = v('s-date'), start = v('s-start'), end = v('s-end');
  if(!date) return alert('日付を選択してください');
  if(!start || !end) return alert('開始・終了時間を入力してください');
  if(start >= end) return alert('終了時間は開始時間より後にしてください');
  sSlots.push({ date, start, end });
  sSlots.sort((a,b) => (a.date+a.start) > (b.date+b.start) ? 1 : -1);
  renderScheduler();
}

function generateMsg() {
  if(!sSlots.length) return alert('候補日時を追加してください');
  const prefix = v('s-prefix'), suffix = v('s-suffix');
  const lines = sSlots.map(s => `・${fmtSlot(s)}`);
  const msg = [prefix, '', ...lines, '', suffix].join('\n').replace(/\n{3,}/g,'\n\n').trim();
  document.getElementById('gen-text').value = msg;
  document.getElementById('gen-result').classList.remove('hidden');
  document.getElementById('copy-ok').classList.add('hidden');
}

function copyMsg() {
  navigator.clipboard.writeText(document.getElementById('gen-text').value).then(()=>{
    document.getElementById('copy-ok').classList.remove('hidden');
    setTimeout(()=>document.getElementById('copy-ok')?.classList.add('hidden'),2000);
  });
}

function calcAge(birthday) {
  if(!birthday) return '';
  const b = new Date(birthday), t = new Date();
  let age = t.getFullYear() - b.getFullYear();
  if(t.getMonth() < b.getMonth() || (t.getMonth()===b.getMonth() && t.getDate()<b.getDate())) age--;
  return age;
}

function addTagOnEnter(e) {
  if(e.key !== 'Enter' && e.key !== ',') return;
  e.preventDefault();
  const inp = e.target, val = inp.value.trim().replace(/,/g,'');
  if(!val) return;
  const wrap = document.getElementById('mf2-tags-wrap');
  const chip = document.createElement('span'); chip.className = 'itag';
  chip.innerHTML = `${esc(val)}<button type="button" onclick="removeTag(this)">×</button>`;
  wrap.insertBefore(chip, inp); inp.value = '';
}

function removeTag(btn) { btn.parentElement.remove(); }

function getTagsFromWrap() {
  const wrap = document.getElementById('mf2-tags-wrap');
  if(!wrap) return '';
  const chips = [...wrap.querySelectorAll('.itag')].map(el => el.childNodes[0].textContent.trim());
  const inp = document.getElementById('mf2-tag-in');
  if(inp?.value.trim()) chips.push(inp.value.trim());
  return chips.filter(Boolean).join(',');
}

function saveMeishiForm(id) {
  const name = document.getElementById('mf2-name').value.trim();
  if(!name) return alert('名前を入力してください');
  const data = {
    name, gender:v('mf2-gender'), birthday:v('mf2-birthday'), residence:v('mf2-residence'),
    phone:v('mf2-phone'), email:v('mf2-email'), contact:v('mf2-contact'),
    company:v('mf2-company'), position:v('mf2-position'), jobType:v('mf2-jobType'),
    workplace:v('mf2-workplace'), hp:v('mf2-hp'), career:v('mf2-career'),
    metDate:v('mf2-metDate'), howMet:v('mf2-howMet'), wantToConnect:v('mf2-wantToConnect'),
    introducedTo:v('mf2-introducedTo'), introducedFrom:v('mf2-introducedFrom'), introduction:v('mf2-introduction'),
    content:v('mf2-content'), problem:v('mf2-problem'), solution:v('mf2-solution'),
    apo1Purpose:v('mf2-apo1p'), apo1Review:v('mf2-apo1r'),
    apo2Purpose:v('mf2-apo2p'), apo2Review:v('mf2-apo2r'),
    apo3Purpose:v('mf2-apo3p'), apo3Review:v('mf2-apo3r'),
    tags:getTagsFromWrap()
  };
  if(id) {
    const i = MC.findIndex(x=>x.id===id);
    if(i>=0) MC[i] = {...MC[i],...data,updatedAt:Date.now()};
    // クライアント側にも基本情報を同期
    const m = MC[i];
    if(m?.clientId) {
      const cl = D.clients.find(x=>x.id===m.clientId);
      if(cl) { Object.assign(cl, {name,company:data.company,position:data.position,phone:data.phone,email:data.email,hp:data.hp}); save(); }
    }
  } else {
    data.id = uid(); data.createdAt = Date.now(); data.updatedAt = Date.now();
    MC.push(data);
  }
  saveMeishi(); closeModal(); renderMeishi();
}

function openOcrCamera(){const i=document.createElement('input');i.type='file';i.accept='image/*';i.capture='environment';i.onchange=e=>{if(e.target.files[0])processOcr(e.target.files[0])};i.click()}
function handleOcrFile(inp){if(inp.files[0])processOcr(inp.files[0]);inp.value='';}
function handleOcrDrop(e){e.preventDefault();document.getElementById('ocr-zone').classList.remove('dragover');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))processOcr(f);}

function compressImage(file,maxKB=900){
  return new Promise(res=>{
    const img=new Image();img.onload=()=>{
      const c=document.createElement('canvas');const M=1600;let w=img.width,h=img.height;
      if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M}else{w=Math.round(w*M/h);h=M}}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.85;const tryC=()=>c.toBlob(b=>{
        if(b.size>maxKB*1024&&q>0.3){q-=0.15;tryC()}
        else{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(b)}
      },'image/jpeg',q);tryC();URL.revokeObjectURL(img.src)
    };img.src=URL.createObjectURL(file);
  });
}

async function processOcr(file) {
  const key = (localStorage.getItem(AK)||'').trim();
  const prog = document.getElementById('ocr-prog');
  const fill = document.getElementById('ocr-fill');
  const st = document.getElementById('ocr-st');
  const prevEl = document.getElementById('ocr-preview');
  const imgEl = document.getElementById('ocr-img');
  if(!prog) return;
  imgEl.src = URL.createObjectURL(file);
  prevEl.classList.remove('hidden');
  prog.classList.remove('hidden');
  fill.style.width='10%'; st.textContent='画像を圧縮中...';
  try {
    const b64 = await compressImage(file);
    fill.style.width='30%'; st.textContent='Gemini で認識中...';
    const base64Data = b64.replace(/^data:image\/\w+;base64,/,'');
    const mimeType = (b64.match(/^data:(image\/\w+);/)||[])[1]||'image/jpeg';
    const body = {contents:[{parts:[
      {text:'この名刺画像から情報を読み取り、以下のJSON形式で返してください。余計な説明は不要です。JSONのみ返してください。\n{"name":"","company":"","position":"","jobType":"","phone":"","email":"","hp":"","workplace":""}'},
      {inline_data:{mime_type:mimeType,data:base64Data}}
    ]}],generationConfig:{temperature:0}};
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(key)}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j = await r.json();
    if(!r.ok) throw new Error(j.error?.message||r.status);
    const text = j.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const match = text.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('読み取れませんでした');
    const result = JSON.parse(match[0]);
    fill.style.width='100%'; st.textContent='完了！フォームに反映します...';
    setTimeout(()=>{ closeModal(); openMeishiFormWithData(result); }, 500);
  } catch(e) {
    fill.style.width='0%'; st.textContent='エラー: '+e.message;
  }
}

          <button class="btn btn-danger btn-sm" onclick="resetAll()">⚠ リセット</button>
        </div>
      </div>
    </div>`;
}

function saveCalUrl() {

async function saveApiKey() {

    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${encodeURIComponent(key)}`);

function exportAll() {
  const blob = new Blob([JSON.stringify({lines:D,meishi:MC},null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`lines_backup_${today()}.json`; a.click();
}

function importAll(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(!confirm('現在のデータを上書きしますか？')) return;
      if(data.lines) { D=data.lines; save(); }
      if(data.meishi) { MC=data.meishi; saveMeishi(); }
      showPage(currentPage); alert('インポート完了');
    } catch { alert('ファイルの読み込みに失敗しました'); }
  };
  reader.readAsText(file);
}

function resetAll() {
  if(!confirm('全データを削除しますか？')) return;
  D = defD(); MC = [];
  save(); saveMeishi(); showPage('home');
}

function showModal(title, body, actions=[], size='') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').style.maxWidth = size==='large'?'800px':'720px';

  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'btn '+a.cls;
    btn.textContent = a.label;
    btn.onclick = a.action;

  });

}

// ===== DIARY =====
let ghDiarySHA = null;

async function diaryFetch() {
  const token = getGhToken(); if (!token) return null;
  const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/diary.md`, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (r.status === 404) return { content: '', sha: null };
  if (!r.ok) return null;
  const j = await r.json();
  ghDiarySHA = j.sha;
  return { content: decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))), sha: j.sha };
}

async function diarySave(text) {
  const token = getGhToken(); if (!token) return false;
  const content = btoa(unescape(encodeURIComponent(text)));
  const body = { message: `diary update ${new Date().toISOString().slice(0,10)}`, content };
  if (ghDiarySHA) body.sha = ghDiarySHA;
  const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/diary.md`, {
    method:'PUT', headers:{ Authorization:`token ${token}`, 'Content-Type':'application/json', Accept:'application/vnd.github.v3+json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) return false;
  const j = await r.json();
  ghDiarySHA = j.content.sha;
  return true;
}

function mdToHtml(md) {
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^## (.+)$/gm,'<h2 style="font-size:1.05rem;font-weight:700;margin:20px 0 6px;color:var(--t1)">$1</h2>')
    .replace(/^### (.+)$/gm,'<h3 style="font-size:.9rem;font-weight:600;margin:12px 0 4px;color:var(--t2)">$1</h3>')
    .replace(/^- (.+)$/gm,'<div style="padding:2px 0 2px 12px;font-size:.88rem;color:var(--t1)">• $1</div>')
    .replace(/^---$/gm,'<hr style="border:none;border-top:1px solid var(--b2);margin:14px 0">')
    .replace(/\n(?!<)/g,' ');
}

async function renderDiary() {
  const el = document.getElementById('content');
  el.innerHTML = `<div style="max-width:680px;margin:0 auto">
    <div id="diary-body" style="min-height:120px;color:var(--t2);font-size:.88rem">読込中...</div>
    <div style="margin-top:28px">
      <h3 style="font-size:.9rem;font-weight:600;margin-bottom:8px">新しい記録を追加</h3>
      <textarea id="diary-input" style="width:100%;min-height:120px;padding:10px;border:1px solid var(--b2);border-radius:8px;background:var(--bg);color:var(--t1);font-size:.88rem;font-family:inherit;resize:vertical;box-sizing:border-box" placeholder="今日あったこと、気づき、反省など..."></textarea>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
        <button class="btn btn-p btn-sm" onclick="saveDiaryEntry()">保存</button>
        <span id="diary-save-status" style="font-size:.8rem;color:var(--t3);align-self:center"></span>
      </div>
    </div>
  </div>`;

  if (!getGhToken()) {
    document.getElementById('diary-body').innerHTML = '<p style="color:var(--r)">GitHubトークンを設定してください（設定タブ）</p>';
    return;
  }
  const res = await diaryFetch();
  if (res === null) {
    document.getElementById('diary-body').innerHTML = '<p style="color:var(--r)">読み込みに失敗しました</p>';
    return;
  }
  document.getElementById('diary-body').innerHTML = res.content ? mdToHtml(res.content) : '<p style="color:var(--t3)">まだ記録がありません</p>';
}

async function saveDiaryEntry() {
  const input = document.getElementById('diary-input');
  const status = document.getElementById('diary-save-status');
  const text = input.value.trim();
  if (!text) return;
  status.textContent = '保存中...';

  const res = await diaryFetch();
  const existing = res ? res.content : '';
  const d = new Date();
  const days = ['日','月','火','水','木','金','土'];
  const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const dayStr = days[d.getDay()];
  const newEntry = `\n## ${dateStr}（${dayStr}）\n\n${text.split('\n').map(l => '- '+l).join('\n')}\n\n---\n`;
  const updated = existing + newEntry;

  const ok = await diarySave(updated);
  if (ok) {
    status.textContent = '保存しました';
    input.value = '';
    document.getElementById('diary-body').innerHTML = mdToHtml(updated);
  } else {
    status.textContent = '保存に失敗しました';
  }
}

// ===== GOOGLE DRIVE SYNC =====
const GCID = '155775695368-6cj0mtohrm24gnkpb3si2ofpmnfjkl2t.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILE = 'saleshub_data.json';
const TOKEN_KEY = 'saleshub_gtoken', TOKEN_EXP_KEY = 'saleshub_gtoken_exp';
let gAccessToken = null, driveFileId = null, syncBusy = false;

function saveToken(token, expiresIn) {
  gAccessToken = token;
  localStorage.setItem(TOKEN_KEY, token);
  localStorage.setItem(TOKEN_EXP_KEY, String(Date.now() + (expiresIn - 60) * 1000));
}
function loadToken() {
  const t = localStorage.getItem(TOKEN_KEY), exp = Number(localStorage.getItem(TOKEN_EXP_KEY) || 0);
  if(t && Date.now() < exp) { gAccessToken = t; return true; }
  gAccessToken = null; localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(TOKEN_EXP_KEY); return false;
}

function setSyncUI(label, ok) {
  document.querySelectorAll('.sync-label').forEach(el => el.textContent = label);
  document.querySelectorAll('.sync-btn').forEach(el => el.style.background = ok ? 'rgba(16,185,129,.15)' : '');
}

function doLogin(callback) {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GCID, scope: DRIVE_SCOPE,
    callback: async resp => {
      if(resp.error) { alert('ログインエラー: ' + (resp.error_description || resp.error)); return; }
      saveToken(resp.access_token, resp.expires_in || 3600);
      localStorage.setItem('saleshub_sync_enabled', '1');
      if(callback) await callback();
    }
  });
  client.requestAccessToken();
}

async function doSync() {
  setSyncUI('同期中...', false);
  try {
    await driveLoad();
    await driveSaveNow();
    setSyncUI('同期済', true);
  } catch(e) {
    if(e.message === '再ログインしてください') {
      localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(TOKEN_EXP_KEY);
      setSyncUI('同期', false);
      doLogin(doSync);
    } else { setSyncUI('エラー', false); console.error('Sync error:', e); }
  }
}

async function handleSync() {
  if(!gAccessToken && !loadToken()) { doLogin(doSync); return; }
  await doSync();
}

async function driveApi(path, opts = {}) {
  const r = await fetch('https://www.googleapis.com/' + path, {
    ...opts, headers: { 'Authorization': 'Bearer ' + gAccessToken, ...(opts.headers || {}) }
  });
  if(r.status === 401) {
    gAccessToken = null; localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(TOKEN_EXP_KEY);
    setSyncUI('同期', false); throw new Error('再ログインしてください');
  }
  return r;
}

async function driveFindFile() {
  const r = await driveApi('drive/v3/files?spaces=appDataFolder&q=name%3D%27' + DRIVE_FILE + '%27&fields=files(id)');
  const j = await r.json();
  driveFileId = (j.files && j.files[0]) ? j.files[0].id : null;
  return driveFileId;
}

function mergeArr(local, remote) {
  const map = new Map();
  remote.forEach(c => map.set(c.id, c));
  local.forEach(c => { const ex = map.get(c.id); if(!ex || (c.updatedAt||'') >= (ex.updatedAt||'')) map.set(c.id, c); });
  return [...map.values()];
}

async function driveLoad() {
  syncBusy = true;
  try {
    await driveFindFile();
    if(!driveFileId) { syncBusy = false; return; }
    const r = await driveApi('drive/v3/files/' + driveFileId + '?alt=media');
    const data = await r.json();
    let changed = false;
    if(data.lines && (data.lines.lastUpdated || 0) > (D.lastUpdated || 0)) {
      D = data.lines; localStorage.setItem(SK, JSON.stringify(D)); changed = true;
    }
    if(data.meishi && Array.isArray(data.meishi)) {
      MC = mergeArr(MC, data.meishi); localStorage.setItem(MSK, JSON.stringify(MC)); changed = true;
    }
    if(data.geminiApiKey) localStorage.setItem(AK, data.geminiApiKey);
    if(changed) { updateBadge(); showPage(currentPage); }
  } catch(e) { console.error('Drive load:', e); }
  syncBusy = false;
}

async function driveSaveNow() {
  if(!gAccessToken) return;
  if(!driveFileId) await driveFindFile();
  const data = JSON.stringify({ lines: D, meishi: MC, geminiApiKey: localStorage.getItem(AK) || '' });
  const meta = { name: DRIVE_FILE, mimeType: 'application/json', ...(!driveFileId ? { parents: ['appDataFolder'] } : {}) };
  const boundary = '---saleshub';
  const body = '--' + boundary + '\r\nContent-Type:application/json;charset=UTF-8\r\n\r\n' + JSON.stringify(meta)
    + '\r\n--' + boundary + '\r\nContent-Type:application/json\r\n\r\n' + data + '\r\n--' + boundary + '--';
  const url = driveFileId ? 'upload/drive/v3/files/' + driveFileId + '?uploadType=multipart' : 'upload/drive/v3/files?uploadType=multipart';
  const r = await driveApi(url, { method: driveFileId ? 'PATCH' : 'POST', headers: { 'Content-Type': 'multipart/related; boundary=' + boundary }, body });
  if(!r.ok) { const e = await r.json(); throw new Error(e.error?.message || r.status); }
  if(!driveFileId) { const j = await r.json(); driveFileId = j.id; }
  setSyncUI('同期済', true);
}

let saveTimer = null;
function driveSave() {
  if(!gAccessToken || syncBusy) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => driveSaveNow().catch(e => { setSyncUI('エラー', false); console.error('Drive save:', e); }), 1500);
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
showPage('home');
updateBadge();
loadFromLocal();
if (getGhToken()) githubLoad();
// 前回同期済みなら自動ロード
if(localStorage.getItem('saleshub_sync_enabled') === '1') {
  window.addEventListener('load', () => {
    setTimeout(() => {
      if(loadToken()) doSync();
      else {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: GCID, scope: DRIVE_SCOPE,
          callback: async resp => {
            if(resp.error) return;
            saveToken(resp.access_token, resp.expires_in || 3600);
            await doSync();
          }
        });
        client.requestAccessToken({ prompt: '' });
      }
    }, 500);
  });
}
